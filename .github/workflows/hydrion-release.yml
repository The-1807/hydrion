name: Hydrion V1.0 Release Candidate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hydrion-v1-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.35.6"
  JAVA_VERSION: "17"

jobs:
  release-candidate:
    name: Validate and build protected artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Require complete production signing configuration
        env:
          KEYSTORE: ${{ secrets.HYDRION_ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.HYDRION_ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.HYDRION_ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.HYDRION_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for value in "$KEYSTORE" "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD"; do
            test -n "$value" || { echo "Production signing configuration is incomplete."; exit 1; }
          done
          echo "::add-mask::$STORE_PASSWORD"
          echo "::add-mask::$KEY_ALIAS"
          echo "::add-mask::$KEY_PASSWORD"
          printf '%s' "$KEYSTORE" | base64 --decode > android/hydrion-release.jks
          cat > android/key.properties <<EOF
          storeFile=../hydrion-release.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Validate source
        run: |
          flutter pub get
          dart format --output=none --set-exit-if-changed .
          flutter analyze
          flutter test
          dart run tool/secret_scan.dart

      - name: Build V1.0 candidate artifacts
        run: |
          flutter build apk --release
          flutter build appbundle --release
          flutter build web --release

      - name: Record metadata and checksums
        run: |
          mkdir -p release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk release-artifacts/hydrion-v1.0.0.apk
          cp build/app/outputs/bundle/release/app-release.aab release-artifacts/hydrion-v1.0.0.aab
          tar -C build/web -czf release-artifacts/hydrion-v1.0.0-web.tar.gz .
          sha256sum release-artifacts/* > release-artifacts/SHA256SUMS.txt
          {
            flutter --version
            dart --version
            java -version
            git rev-parse HEAD
            grep '^version:' pubspec.yaml
          } > release-artifacts/TOOLCHAIN_AND_SOURCE.txt 2>&1

      - name: Upload candidate artifacts without publishing
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-v1.0-candidate-${{ github.run_number }}
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 30
