name: Hydrion Flutter CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hydrion-flutter-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.6"
  JAVA_VERSION: "17"

jobs:
  quality-gate:
    name: Analyze and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          dart --version
          java -version

      - name: Validate Flutter project root
        run: |
          test -f pubspec.yaml
          test -d lib

      - name: Get dependencies
        run: flutter pub get

      - name: Verify generated package state
        run: flutter pub deps

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-coverage
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: quality-gate

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: quality-gate

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Flutter web
        run: flutter build web --release

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-web-build
          path: build/web
          if-no-files-found: error
          retention-days: 14
