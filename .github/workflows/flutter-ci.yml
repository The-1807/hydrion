name: Hydrion Flutter CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hydrion-flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.44.4"
  JAVA_VERSION: "17"
  CI_ARTIFACTS_DIRECTORY: "ci-artifacts"

jobs:
  quality-gate:
    name: Analyze, Test, and Audit
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Create CI artifact directory
        run: mkdir -p "${CI_ARTIFACTS_DIRECTORY}"

      - name: Record environment information
        run: |
          {
            echo "Hydrion CI environment"
            echo "======================"
            echo
            echo "Repository: ${{ github.repository }}"
            echo "Event: ${{ github.event_name }}"
            echo "Ref: ${{ github.ref }}"
            echo "Commit: ${{ github.sha }}"
            echo "Runner OS: ${{ runner.os }}"
            echo "Runner architecture: ${{ runner.arch }}"
            echo
            echo "Flutter:"
            flutter --version
            echo
            echo "Dart:"
            dart --version
            echo
            echo "Java:"
            java -version
            echo
            echo "Git:"
            git --version
          } 2>&1 | tee "${CI_ARTIFACTS_DIRECTORY}/environment.txt"

      - name: Validate Flutter project root
        run: |
          set -euo pipefail

          test -f pubspec.yaml || {
            echo "pubspec.yaml was not found at the repository root."
            exit 1
          }

          test -d lib || {
            echo "The lib directory was not found at the repository root."
            exit 1
          }

          test -d test || {
            echo "The test directory was not found at the repository root."
            exit 1
          }

      - name: Get dependencies
        run: |
          set -o pipefail
          flutter pub get 2>&1 |
            tee "${CI_ARTIFACTS_DIRECTORY}/flutter-pub-get.log"

      - name: Record dependency state
        run: |
          set -o pipefail
          flutter pub deps 2>&1 |
            tee "${CI_ARTIFACTS_DIRECTORY}/flutter-pub-deps.log"

      - name: Check outdated dependencies
        id: outdated
        continue-on-error: true
        run: |
          set +e
          set -o pipefail

          flutter pub outdated 2>&1 |
            tee "${CI_ARTIFACTS_DIRECTORY}/flutter-pub-outdated.log"

          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"

      - name: Run secret hygiene scan
        id: secret_scan
        continue-on-error: true
        run: |
          set +e
          set -o pipefail

          timeout 10m dart run tool/secret_scan.dart 2>&1 |
            tee "${CI_ARTIFACTS_DIRECTORY}/secret-scan.log"

          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"

      - name: Run Flutter analyzer
        id: analyze
        continue-on-error: true
        run: |
          set +e
          set -o pipefail

          timeout 15m flutter analyze 2>&1 |
            tee "${CI_ARTIFACTS_DIRECTORY}/flutter-analyze.log"

          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"

      - name: Run complete Flutter test suite
        id: tests
        continue-on-error: true
        run: |
          set +e

          timeout 30m flutter test \
            --no-pub \
            --coverage \
            --machine \
            --timeout 2m \
            > "${CI_ARTIFACTS_DIRECTORY}/flutter-test-machine.jsonl" \
            2> "${CI_ARTIFACTS_DIRECTORY}/flutter-test-stderr.log"

          exit_code=$?
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"

      - name: Generate complete Flutter test report
        if: always()
        env:
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          artifacts = Path(os.environ["CI_ARTIFACTS_DIRECTORY"])
          machine_path = artifacts / "flutter-test-machine.jsonl"
          stderr_path = artifacts / "flutter-test-stderr.log"
          report_path = artifacts / "BUG_REPORT.md"
          readable_path = artifacts / "flutter-test-readable.log"

          tests = {}
          failures = []
          errors_by_test = {}
          stacks_by_test = {}
          global_errors = []
          suite_errors = []
          malformed_lines = []
          all_output = []

          if machine_path.exists():
              with machine_path.open("r", encoding="utf-8", errors="replace") as stream:
                  for line_number, raw_line in enumerate(stream, start=1):
                      line = raw_line.strip()
                      if not line:
                          continue

                      try:
                          event = json.loads(line)
                      except json.JSONDecodeError:
                          malformed_lines.append(
                              f"Line {line_number}: {line}"
                          )
                          continue

                      if isinstance(event, list):
                          all_output.append(
                              f"PROTOCOL EVENT: {json.dumps(event, ensure_ascii=False)}"
                          )
                          continue

                      if not isinstance(event, dict):
                          malformed_lines.append(
                              f"Line {line_number}: unsupported JSON value: {event!r}"
                          )
                          continue

                      event_type = event.get("type")

                      if event_type == "suite":
                          suite = event.get("suite", {})
                          all_output.append(
                              f"SUITE: {suite.get('path', suite.get('url', 'unknown'))}"
                          )

                      elif event_type == "testStart":
                          test = event.get("test", {})
                          test_id = test.get("id")
                          if test_id is not None:
                              tests[test_id] = {
                                  "name": test.get("name", "Unknown test"),
                                  "url": test.get("url", "Unknown file"),
                                  "line": test.get("line"),
                                  "column": test.get("column"),
                              }
                              all_output.append(
                                  f"START: {tests[test_id]['name']} "
                                  f"({tests[test_id]['url']})"
                              )

                      elif event_type == "print":
                          message = event.get("message", "")
                          test_id = event.get("testID")
                          prefix = "PRINT"
                          if test_id in tests:
                              prefix = f"PRINT [{tests[test_id]['name']}]"
                          all_output.append(f"{prefix}: {message}")

                      elif event_type == "error":
                          test_id = event.get("testID")
                          error = event.get("error", "Unknown test error")
                          stack = event.get("stackTrace", "")
                          is_failure = event.get("isFailure", False)

                          if test_id is None:
                              global_errors.append(
                                  {
                                      "error": error,
                                      "stack": stack,
                                      "is_failure": is_failure,
                                  }
                              )
                              all_output.append(f"GLOBAL ERROR: {error}")
                              if stack:
                                  all_output.append(stack)
                          else:
                              errors_by_test.setdefault(test_id, []).append(error)
                              if stack:
                                  stacks_by_test.setdefault(test_id, []).append(stack)
                              test_name = tests.get(test_id, {}).get(
                                  "name", f"Unknown test {test_id}"
                              )
                              all_output.append(f"ERROR [{test_name}]: {error}")
                              if stack:
                                  all_output.append(stack)

                      elif event_type == "testDone":
                          test_id = event.get("testID")
                          result = event.get("result", "unknown")
                          hidden = event.get("hidden", False)
                          skipped = event.get("skipped", False)
                          test = tests.get(
                              test_id,
                              {
                                  "name": f"Unknown test ID {test_id}",
                                  "url": "Unknown file",
                                  "line": None,
                                  "column": None,
                              },
                          )

                          all_output.append(
                              f"DONE: {test['name']} -> {result}"
                          )

                          if result == "failure":
                              failures.append(
                                  {
                                      "id": test_id,
                                      "name": test["name"],
                                      "url": test["url"],
                                      "line": test["line"],
                                      "column": test["column"],
                                      "errors": errors_by_test.get(test_id, []),
                                      "stacks": stacks_by_test.get(test_id, []),
                                      "hidden": hidden,
                                      "skipped": skipped,
                                  }
                              )

                      elif event_type == "done":
                          all_output.append(
                              f"COMPLETE: success={event.get('success')}"
                          )

                      elif event_type == "debug":
                          message = event.get("message", "")
                          all_output.append(f"DEBUG: {message}")

                      elif event_type == "group":
                          group = event.get("group", {})
                          all_output.append(
                              f"GROUP: {group.get('name', 'unknown')}"
                          )

                      elif event_type == "allSuites":
                          all_output.append(
                              f"ALL SUITES: count={event.get('count', 'unknown')}"
                          )

                      elif event_type == "suiteDone":
                          if event.get("error"):
                              suite_errors.append(
                                  {
                                      "suite_id": event.get("suiteID"),
                                      "error": event.get("error"),
                                      "stack": event.get("stackTrace", ""),
                                  }
                              )

          stderr_text = ""
          if stderr_path.exists():
              stderr_text = stderr_path.read_text(
                  encoding="utf-8",
                  errors="replace",
              )

          readable_path.write_text(
              "\n".join(all_output)
              + ("\n\nSTDERR\n======\n" + stderr_text if stderr_text else ""),
              encoding="utf-8",
          )

          test_exit = os.environ.get("TEST_EXIT_CODE", "not-run")
          timeout_detected = any(
              "timeout" in error.lower()
              for failure in failures
              for error in failure["errors"]
          ) or "timeout" in stderr_text.lower()

          with report_path.open("w", encoding="utf-8") as report:
              report.write("# Hydrion Flutter Test Bug Report\n\n")

              report.write("## Run information\n\n")
              report.write("| Field | Value |\n")
              report.write("|---|---|\n")
              report.write(
                  f"| Repository | `{os.environ.get('GITHUB_REPOSITORY', 'unknown')}` |\n"
              )
              report.write(
                  f"| Commit | `{os.environ.get('GITHUB_SHA', 'unknown')}` |\n"
              )
              report.write(
                  f"| Ref | `{os.environ.get('GITHUB_REF', 'unknown')}` |\n"
              )
              report.write(
                  f"| Workflow run | `{os.environ.get('GITHUB_RUN_ID', 'unknown')}` |\n"
              )
              report.write(f"| Test exit code | `{test_exit}` |\n")
              report.write(f"| Failed tests | `{len(failures)}` |\n")
              report.write(
                  f"| Timeout detected | `{'yes' if timeout_detected else 'no'}` |\n"
              )
              report.write("\n")

              report.write("## Classification\n\n")
              if failures:
                  if timeout_detected:
                      report.write(
                          "- One or more tests failed with a timeout or hanging-test signal.\n"
                      )
                  report.write(
                      "- Each failed test below requires triage before being converted into a GitHub issue.\n"
                  )
              elif test_exit != "0":
                  report.write(
                      "- The test command failed, but no structured failed-test event was found.\n"
                  )
                  report.write(
                      "- Review the global errors, suite errors, stderr, and malformed machine output sections.\n"
                  )
              else:
                  report.write("- The complete Flutter test suite passed.\n")
              report.write("\n")

              report.write("## Failed tests\n\n")
              if not failures:
                  report.write("No failed test events were detected.\n\n")
              else:
                  for index, failure in enumerate(failures, start=1):
                      report.write(f"### {index}. {failure['name']}\n\n")
                      report.write(f"- File: `{failure['url']}`\n")
                      if failure["line"] is not None:
                          report.write(f"- Line: `{failure['line']}`\n")
                      if failure["column"] is not None:
                          report.write(f"- Column: `{failure['column']}`\n")
                      report.write("\n")

                      report.write("#### Errors\n\n")
                      if failure["errors"]:
                          for error in failure["errors"]:
                              report.write("```text\n")
                              report.write(error.rstrip())
                              report.write("\n```\n\n")
                      else:
                          report.write(
                              "No structured error message was emitted for this failed test.\n\n"
                          )

                      report.write("#### Stack traces\n\n")
                      if failure["stacks"]:
                          for stack in failure["stacks"]:
                              report.write("```text\n")
                              report.write(stack.rstrip())
                              report.write("\n```\n\n")
                      else:
                          report.write(
                              "No structured stack trace was emitted for this failed test.\n\n"
                          )

              if global_errors:
                  report.write("## Global test runner errors\n\n")
                  for item in global_errors:
                      report.write("```text\n")
                      report.write(item["error"].rstrip())
                      if item["stack"]:
                          report.write("\n\n")
                          report.write(item["stack"].rstrip())
                      report.write("\n```\n\n")

              if suite_errors:
                  report.write("## Test suite errors\n\n")
                  for item in suite_errors:
                      report.write("```text\n")
                      report.write(str(item["error"]).rstrip())
                      if item["stack"]:
                          report.write("\n\n")
                          report.write(str(item["stack"]).rstrip())
                      report.write("\n```\n\n")

              if malformed_lines:
                  report.write("## Malformed machine-output lines\n\n")
                  report.write("```text\n")
                  report.write("\n".join(malformed_lines))
                  report.write("\n```\n\n")

              report.write("## Test runner stderr\n\n")
              report.write("```text\n")
              report.write(stderr_text or "No stderr output was produced.")
              report.write("\n```\n\n")

              report.write("## Evidence files\n\n")
              report.write("- `flutter-test-machine.jsonl`\n")
              report.write("- `flutter-test-readable.log`\n")
              report.write("- `flutter-test-stderr.log`\n")
              report.write("- `flutter-analyze.log`\n")
              report.write("- `secret-scan.log`\n")
              report.write("- `environment.txt`\n")
              report.write("- `coverage/lcov.info`, when generated\n")

          print(
              f"Generated {report_path} with {len(failures)} structured failures."
          )
          PY

      - name: Generate CI quality summary
        if: always()
        env:
          SECRET_EXIT: ${{ steps.secret_scan.outputs.exit_code }}
          ANALYZE_EXIT: ${{ steps.analyze.outputs.exit_code }}
          TEST_EXIT: ${{ steps.tests.outputs.exit_code }}
          OUTDATED_EXIT: ${{ steps.outdated.outputs.exit_code }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          artifacts = Path(os.environ["CI_ARTIFACTS_DIRECTORY"])
          summary_path = artifacts / "CI_SUMMARY.md"

          checks = [
              ("Secret hygiene scan", os.environ.get("SECRET_EXIT") or "not-run"),
              ("Flutter analyze", os.environ.get("ANALYZE_EXIT") or "not-run"),
              ("Flutter tests", os.environ.get("TEST_EXIT") or "not-run"),
              ("Dependency audit", os.environ.get("OUTDATED_EXIT") or "not-run"),
          ]

          with summary_path.open("w", encoding="utf-8") as summary:
              summary.write("# Hydrion CI Audit\n\n")
              summary.write("| Check | Exit code | Result |\n")
              summary.write("|---|---:|---|\n")

              for name, exit_code in checks:
                  result = "Passed" if exit_code == "0" else "Failed or not completed"
                  summary.write(f"| {name} | `{exit_code}` | {result} |\n")

              summary.write("\n")
              summary.write(
                  f"Workflow run: {os.environ.get('GITHUB_SERVER_URL')}/"
                  f"{os.environ.get('GITHUB_REPOSITORY')}/actions/runs/"
                  f"{os.environ.get('GITHUB_RUN_ID')}\n"
              )

          print(f"Generated {summary_path}.")
          PY

      - name: Publish CI job summary
        if: always()
        run: |
          if [[ -f "${CI_ARTIFACTS_DIRECTORY}/CI_SUMMARY.md" ]]; then
            cat "${CI_ARTIFACTS_DIRECTORY}/CI_SUMMARY.md" >> "${GITHUB_STEP_SUMMARY}"
          fi

          if [[ -f "${CI_ARTIFACTS_DIRECTORY}/BUG_REPORT.md" ]]; then
            echo >> "${GITHUB_STEP_SUMMARY}"
            cat "${CI_ARTIFACTS_DIRECTORY}/BUG_REPORT.md" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload CI audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-ci-audit-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            ci-artifacts/
            coverage/lcov.info
          if-no-files-found: warn
          retention-days: 30

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-coverage-${{ github.run_number }}-${{ github.run_attempt }}
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce quality gate
        if: always()
        env:
          SECRET_EXIT: ${{ steps.secret_scan.outputs.exit_code }}
          ANALYZE_EXIT: ${{ steps.analyze.outputs.exit_code }}
          TEST_EXIT: ${{ steps.tests.outputs.exit_code }}
        run: |
          secret_exit="${SECRET_EXIT:-1}"
          analyze_exit="${ANALYZE_EXIT:-1}"
          test_exit="${TEST_EXIT:-1}"

          failed=0

          if [[ "${secret_exit}" != "0" ]]; then
            echo "::error::Secret hygiene scan failed with exit code ${secret_exit}."
            failed=1
          fi

          if [[ "${analyze_exit}" != "0" ]]; then
            echo "::error::Flutter analyze failed with exit code ${analyze_exit}."
            failed=1
          fi

          if [[ "${test_exit}" != "0" ]]; then
            echo "::error::Flutter tests failed with exit code ${test_exit}."
            failed=1
          fi

          if [[ "${failed}" -ne 0 ]]; then
            echo "Hydrion quality gate failed. Download the CI audit artifact and review BUG_REPORT.md."
            exit 1
          fi

          echo "Hydrion quality gate passed."

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quality-gate

    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-android-apk-${{ github.run_number }}-${{ github.run_attempt }}
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality-gate

    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Flutter web
        run: flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-web-build-${{ github.run_number }}-${{ github.run_attempt }}
          path: build/web
          if-no-files-found: error
          retention-days: 14
