name: Hydrion Flutter CI

on:
  push:
    branches:
      - main
      - develop
      - apk-stabilization
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hydrion-flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.6"
  JAVA_VERSION: "17"
  CI_ARTIFACTS_DIRECTORY: "ci-artifacts"

jobs:
  quality-gate:
    name: Analyze, Test, and Audit
    runs-on: ubuntu-latest
    timeout-minutes: 45

    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Create CI artifact directory
        run: mkdir -p "${CI_ARTIFACTS_DIRECTORY}"

      - name: Record environment information
        run: |
          {
            echo "Hydrion CI environment"
            echo "======================"
            echo
            echo "Repository: ${{ github.repository }}"
            echo "Event: ${{ github.event_name }}"
            echo "Ref: ${{ github.ref }}"
            echo "Commit: ${{ github.sha }}"
            echo "Runner OS: ${{ runner.os }}"
            echo "Runner architecture: ${{ runner.arch }}"
            echo
            echo "Flutter:"
            flutter --version
            echo
            echo "Dart:"
            dart --version
            echo
            echo "Java:"
            java -version
            echo
            echo "Git:"
            git --version
          } 2>&1 | tee "${CI_ARTIFACTS_DIRECTORY}/environment.txt"

      - name: Validate Flutter project root
        run: |
          set -euo pipefail

          test -f pubspec.yaml || {
            echo "pubspec.yaml was not found at the repository root."
            exit 1
          }

          test -d lib || {
            echo "The lib directory was not found at the repository root."
            exit 1
          }

          test -d test || {
            echo "The test directory was not found at the repository root."
            exit 1
          }

      - name: Get dependencies
        run: |
          set -o pipefail
          flutter pub get 2>&1 |
            tee "${CI_ARTIFACTS_DIRECTORY}/flutter-pub-get.log"

      - name: Record dependency state
        run: |
          set -o pipefail
          flutter pub deps 2>&1 |
            tee "${CI_ARTIFACTS_DIRECTORY}/flutter-pub-deps.log"

      - name: Check outdated dependencies
        id: outdated
        continue-on-error: true
        run: |
          set +e
          set -o pipefail

          flutter pub outdated 2>&1 |
            tee "${CI_ARTIFACTS_DIRECTORY}/flutter-pub-outdated.log"

          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"

      - name: Run secret hygiene scan
        id: secret_scan
        continue-on-error: true
        run: |
          set +e
          set -o pipefail

          timeout 10m dart run tool/secret_scan.dart 2>&1 |
            tee "${CI_ARTIFACTS_DIRECTORY}/secret-scan.log"

          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"

      - name: Verify Dart formatting
        id: format
        continue-on-error: true
        run: |
          set +e
          set -o pipefail

          dart format --set-exit-if-changed . 2>&1 |
            tee "${CI_ARTIFACTS_DIRECTORY}/dart-format.log"

          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"

      - name: Run Flutter analyzer
        id: analyze
        continue-on-error: true
        run: |
          set +e
          set -o pipefail

          timeout 15m flutter analyze 2>&1 |
            tee "${CI_ARTIFACTS_DIRECTORY}/flutter-analyze.log"

          exit_code=${PIPESTATUS[0]}
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"

      - name: Run complete Flutter test suite
        id: tests
        continue-on-error: true
        run: |
          set +e

          timeout 30m flutter test \
            --no-pub \
            --coverage \
            --machine \
            --timeout 2m \
            > "${CI_ARTIFACTS_DIRECTORY}/flutter-test-machine.jsonl" \
            2> "${CI_ARTIFACTS_DIRECTORY}/flutter-test-stderr.log"

          exit_code=$?
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"

      - name: Generate complete Flutter test report
        id: test_report
        if: always()
        continue-on-error: true
        env:
          TEST_EXIT_CODE: ${{ steps.tests.outputs.exit_code }}
        run: |
          set +e

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          from typing import Any, Iterator

          artifacts = Path(os.environ["CI_ARTIFACTS_DIRECTORY"])
          machine_path = artifacts / "flutter-test-machine.jsonl"
          stderr_path = artifacts / "flutter-test-stderr.log"
          report_path = artifacts / "BUG_REPORT.md"
          readable_path = artifacts / "flutter-test-readable.log"

          tests: dict[Any, dict[str, Any]] = {}
          failures: list[dict[str, Any]] = []
          errors_by_test: dict[Any, list[str]] = {}
          stacks_by_test: dict[Any, list[str]] = {}
          global_errors: list[dict[str, Any]] = []
          suite_errors: list[dict[str, Any]] = []
          malformed_lines: list[str] = []
          unsupported_values: list[str] = []
          all_output: list[str] = []

          def as_mapping(value: Any) -> dict[str, Any]:
              return value if isinstance(value, dict) else {}

          def flatten_events(value: Any, origin: str) -> Iterator[dict[str, Any]]:
              if isinstance(value, dict):
                  yield value
                  return

              if isinstance(value, list):
                  if not value:
                      unsupported_values.append(f"{origin}: empty list")
                      return

                  for index, item in enumerate(value):
                      yield from flatten_events(item, f"{origin}[{index}]")
                  return

              unsupported_values.append(
                  f"{origin}: unsupported {type(value).__name__}: {value!r}"
              )

          if machine_path.exists():
              with machine_path.open("r", encoding="utf-8", errors="replace") as stream:
                  for line_number, raw_line in enumerate(stream, start=1):
                      line = raw_line.strip()
                      if not line:
                          continue

                      try:
                          decoded = json.loads(line)
                      except json.JSONDecodeError as error:
                          malformed_lines.append(
                              f"Line {line_number}: {error.msg}: {line}"
                          )
                          continue

                      for event in flatten_events(decoded, f"Line {line_number}"):
                          event_type = event.get("type")

                          if not isinstance(event_type, str):
                              event_name = event.get("event")
                              if event_name == "test.startedProcess":
                                  all_output.append(
                                      "PROCESS: Flutter test process started"
                                  )
                                  continue
                              unsupported_values.append(
                                  f"Line {line_number}: event without string type: "
                                  f"{json.dumps(event, ensure_ascii=False)}"
                              )
                              continue

                          if event_type == "suite":
                              suite = as_mapping(event.get("suite"))
                              suite_path = suite.get(
                                  "path",
                                  suite.get("url", "unknown"),
                              )
                              all_output.append(f"SUITE: {suite_path}")

                          elif event_type == "testStart":
                              test = as_mapping(event.get("test"))
                              test_id = test.get("id")

                              if test_id is None:
                                  unsupported_values.append(
                                      f"Line {line_number}: testStart without test id: "
                                      f"{json.dumps(event, ensure_ascii=False)}"
                                  )
                                  continue

                              tests[test_id] = {
                                  "name": test.get("name", "Unknown test"),
                                  "url": test.get("url", "Unknown file"),
                                  "line": test.get("line"),
                                  "column": test.get("column"),
                              }
                              all_output.append(
                                  f"START: {tests[test_id]['name']} "
                                  f"({tests[test_id]['url']})"
                              )

                          elif event_type == "print":
                              message = event.get("message", "")
                              test_id = event.get("testID")
                              prefix = "PRINT"

                              if test_id in tests:
                                  prefix = f"PRINT [{tests[test_id]['name']}]"

                              all_output.append(f"{prefix}: {message}")

                          elif event_type == "error":
                              test_id = event.get("testID")
                              error_text = str(
                                  event.get("error", "Unknown test error")
                              )
                              stack = str(event.get("stackTrace", "") or "")
                              is_failure = bool(event.get("isFailure", False))

                              if test_id is None:
                                  global_errors.append(
                                      {
                                          "error": error_text,
                                          "stack": stack,
                                          "is_failure": is_failure,
                                      }
                                  )
                                  all_output.append(f"GLOBAL ERROR: {error_text}")
                                  if stack:
                                      all_output.append(stack)
                              else:
                                  errors_by_test.setdefault(test_id, []).append(
                                      error_text
                                  )
                                  if stack:
                                      stacks_by_test.setdefault(test_id, []).append(
                                          stack
                                      )

                                  test_name = tests.get(test_id, {}).get(
                                      "name",
                                      f"Unknown test {test_id}",
                                  )
                                  all_output.append(
                                      f"ERROR [{test_name}]: {error_text}"
                                  )
                                  if stack:
                                      all_output.append(stack)

                          elif event_type == "testDone":
                              test_id = event.get("testID")
                              result = event.get("result", "unknown")
                              hidden = bool(event.get("hidden", False))
                              skipped = bool(event.get("skipped", False))
                              test = tests.get(
                                  test_id,
                                  {
                                      "name": f"Unknown test ID {test_id}",
                                      "url": "Unknown file",
                                      "line": None,
                                      "column": None,
                                  },
                              )

                              all_output.append(
                                  f"DONE: {test['name']} -> {result}"
                              )

                              if result == "failure":
                                  failures.append(
                                      {
                                          "id": test_id,
                                          "name": test["name"],
                                          "url": test["url"],
                                          "line": test["line"],
                                          "column": test["column"],
                                          "errors": errors_by_test.get(test_id, []),
                                          "stacks": stacks_by_test.get(test_id, []),
                                          "hidden": hidden,
                                          "skipped": skipped,
                                      }
                                  )

                          elif event_type == "done":
                              all_output.append(
                                  f"COMPLETE: success={event.get('success')}"
                              )

                          elif event_type == "debug":
                              all_output.append(
                                  f"DEBUG: {event.get('message', '')}"
                              )

                          elif event_type == "group":
                              group = as_mapping(event.get("group"))
                              all_output.append(
                                  f"GROUP: {group.get('name', 'unknown')}"
                              )

                          elif event_type == "allSuites":
                              all_output.append(
                                  f"ALL SUITES: count={event.get('count', 'unknown')}"
                              )

                          elif event_type == "suiteDone":
                              suite_error = event.get("error")
                              if suite_error:
                                  suite_errors.append(
                                      {
                                          "suite_id": event.get("suiteID"),
                                          "error": str(suite_error),
                                          "stack": str(
                                              event.get("stackTrace", "") or ""
                                          ),
                                      }
                                  )

                          else:
                              all_output.append(
                                  f"EVENT [{event_type}]: "
                                  f"{json.dumps(event, ensure_ascii=False)}"
                              )
          else:
              unsupported_values.append(
                  f"Machine-output file does not exist: {machine_path}"
              )

          stderr_text = ""
          if stderr_path.exists():
              stderr_text = stderr_path.read_text(
                  encoding="utf-8",
                  errors="replace",
              )

          readable_sections = ["\n".join(all_output)]

          if unsupported_values:
              readable_sections.append(
                  "UNSUPPORTED OR INCOMPLETE PROTOCOL VALUES\n"
                  "=========================================\n"
                  + "\n".join(unsupported_values)
              )

          if malformed_lines:
              readable_sections.append(
                  "MALFORMED JSON LINES\n"
                  "====================\n"
                  + "\n".join(malformed_lines)
              )

          if stderr_text:
              readable_sections.append(
                  "STDERR\n"
                  "======\n"
                  + stderr_text
              )

          readable_path.write_text(
              "\n\n".join(section for section in readable_sections if section),
              encoding="utf-8",
          )

          test_exit = os.environ.get("TEST_EXIT_CODE") or "not-run"
          timeout_detected = (
              any(
                  "timeout" in error.casefold()
                  for failure in failures
                  for error in failure["errors"]
              )
              or any(
                  "timeout" in item["error"].casefold()
                  for item in global_errors
              )
              or "timeout" in stderr_text.casefold()
          )

          with report_path.open("w", encoding="utf-8") as report:
              report.write("# Hydrion Flutter Test Bug Report\n\n")

              report.write("## Run information\n\n")
              report.write("| Field | Value |\n")
              report.write("|---|---|\n")
              report.write(
                  f"| Repository | `{os.environ.get('GITHUB_REPOSITORY', 'unknown')}` |\n"
              )
              report.write(
                  f"| Commit | `{os.environ.get('GITHUB_SHA', 'unknown')}` |\n"
              )
              report.write(
                  f"| Ref | `{os.environ.get('GITHUB_REF', 'unknown')}` |\n"
              )
              report.write(
                  f"| Workflow run | `{os.environ.get('GITHUB_RUN_ID', 'unknown')}` |\n"
              )
              report.write(f"| Test exit code | `{test_exit}` |\n")
              report.write(f"| Failed tests | `{len(failures)}` |\n")
              report.write(
                  f"| Global errors | `{len(global_errors)}` |\n"
              )
              report.write(
                  f"| Suite errors | `{len(suite_errors)}` |\n"
              )
              report.write(
                  f"| Malformed lines | `{len(malformed_lines)}` |\n"
              )
              report.write(
                  f"| Unsupported values | `{len(unsupported_values)}` |\n"
              )
              report.write(
                  f"| Timeout detected | `{'yes' if timeout_detected else 'no'}` |\n"
              )
              report.write("\n")

              report.write("## Classification\n\n")
              if failures:
                  if timeout_detected:
                      report.write(
                          "- One or more tests failed with a timeout or hanging-test signal.\n"
                      )
                  report.write(
                      "- Structured failed-test events were detected and require triage.\n"
                  )
              elif test_exit != "0":
                  report.write(
                      "- The test command failed, but no structured failed-test event was found.\n"
                  )
                  report.write(
                      "- Review global errors, suite errors, stderr, malformed lines, "
                      "and unsupported protocol values.\n"
                  )
              else:
                  report.write("- The complete Flutter test suite passed.\n")

              if malformed_lines or unsupported_values:
                  report.write(
                      "- The machine-output stream also contained malformed, empty, "
                      "unsupported, or incomplete values retained as evidence.\n"
                  )

              report.write("\n")

              report.write("## Failed tests\n\n")
              if not failures:
                  report.write("No failed test events were detected.\n\n")
              else:
                  for index, failure in enumerate(failures, start=1):
                      report.write(f"### {index}. {failure['name']}\n\n")
                      report.write(f"- File: `{failure['url']}`\n")
                      if failure["line"] is not None:
                          report.write(f"- Line: `{failure['line']}`\n")
                      if failure["column"] is not None:
                          report.write(f"- Column: `{failure['column']}`\n")
                      report.write("\n")

                      report.write("#### Errors\n\n")
                      if failure["errors"]:
                          for error_text in failure["errors"]:
                              report.write("```text\n")
                              report.write(error_text.rstrip())
                              report.write("\n```\n\n")
                      else:
                          report.write(
                              "No structured error message was emitted for this failed test.\n\n"
                          )

                      report.write("#### Stack traces\n\n")
                      if failure["stacks"]:
                          for stack in failure["stacks"]:
                              report.write("```text\n")
                              report.write(stack.rstrip())
                              report.write("\n```\n\n")
                      else:
                          report.write(
                              "No structured stack trace was emitted for this failed test.\n\n"
                          )

              if global_errors:
                  report.write("## Global test runner errors\n\n")
                  for item in global_errors:
                      report.write("```text\n")
                      report.write(item["error"].rstrip())
                      if item["stack"]:
                          report.write("\n\n")
                          report.write(item["stack"].rstrip())
                      report.write("\n```\n\n")

              if suite_errors:
                  report.write("## Test suite errors\n\n")
                  for item in suite_errors:
                      report.write("```text\n")
                      report.write(item["error"].rstrip())
                      if item["stack"]:
                          report.write("\n\n")
                          report.write(item["stack"].rstrip())
                      report.write("\n```\n\n")

              if malformed_lines:
                  report.write("## Malformed machine-output lines\n\n")
                  report.write("```text\n")
                  report.write("\n".join(malformed_lines))
                  report.write("\n```\n\n")

              if unsupported_values:
                  report.write("## Unsupported or incomplete protocol values\n\n")
                  report.write("```text\n")
                  report.write("\n".join(unsupported_values))
                  report.write("\n```\n\n")

              report.write("## Test runner stderr\n\n")
              report.write("```text\n")
              report.write(stderr_text or "No stderr output was produced.")
              report.write("\n```\n\n")

              report.write("## Evidence files\n\n")
              report.write("- `flutter-test-machine.jsonl`\n")
              report.write("- `flutter-test-readable.log`\n")
              report.write("- `flutter-test-stderr.log`\n")
              report.write("- `flutter-analyze.log`\n")
              report.write("- `secret-scan.log`\n")
              report.write("- `environment.txt`\n")
              report.write("- `coverage/lcov.info`, when generated\n")

          print(
              f"Generated {report_path} with "
              f"{len(failures)} structured failures, "
              f"{len(malformed_lines)} malformed lines, and "
              f"{len(unsupported_values)} unsupported values."
          )
          PY

          exit_code=$?
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
          exit "${exit_code}"

      - name: Generate CI quality summary
        if: always()
        env:
          SECRET_EXIT: ${{ steps.secret_scan.outputs.exit_code }}
          FORMAT_EXIT: ${{ steps.format.outputs.exit_code }}
          ANALYZE_EXIT: ${{ steps.analyze.outputs.exit_code }}
          TEST_EXIT: ${{ steps.tests.outputs.exit_code }}
          OUTDATED_EXIT: ${{ steps.outdated.outputs.exit_code }}
          REPORT_EXIT: ${{ steps.test_report.outputs.exit_code }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          artifacts = Path(os.environ["CI_ARTIFACTS_DIRECTORY"])
          summary_path = artifacts / "CI_SUMMARY.md"

          checks = [
              ("Secret hygiene scan", os.environ.get("SECRET_EXIT") or "not-run", True),
              ("Dart format", os.environ.get("FORMAT_EXIT") or "not-run", True),
              ("Flutter analyze", os.environ.get("ANALYZE_EXIT") or "not-run", True),
              ("Flutter tests", os.environ.get("TEST_EXIT") or "not-run", True),
              ("Dependency audit", os.environ.get("OUTDATED_EXIT") or "not-run", False),
              ("Test report generation", os.environ.get("REPORT_EXIT") or "not-run", False),
          ]

          with summary_path.open("w", encoding="utf-8") as summary:
              summary.write("# Hydrion CI Audit\n\n")
              summary.write("| Check | Exit code | Result | Gate |\n")
              summary.write("|---|---:|---|---|\n")

              for name, exit_code, blocking in checks:
                  result = "Passed" if exit_code == "0" else "Failed or not completed"
                  gate = "Blocking" if blocking else "Diagnostic"
                  summary.write(
                      f"| {name} | `{exit_code}` | {result} | {gate} |\n"
                  )

              summary.write("\n")
              summary.write(
                  f"Workflow run: {os.environ.get('GITHUB_SERVER_URL')}/"
                  f"{os.environ.get('GITHUB_REPOSITORY')}/actions/runs/"
                  f"{os.environ.get('GITHUB_RUN_ID')}\n"
              )

          print(f"Generated {summary_path}.")
          PY

      - name: Publish CI job summary
        if: always()
        run: |
          if [[ -f "${CI_ARTIFACTS_DIRECTORY}/CI_SUMMARY.md" ]]; then
            cat "${CI_ARTIFACTS_DIRECTORY}/CI_SUMMARY.md" >> "${GITHUB_STEP_SUMMARY}"
          fi

          if [[ -f "${CI_ARTIFACTS_DIRECTORY}/BUG_REPORT.md" ]]; then
            echo >> "${GITHUB_STEP_SUMMARY}"
            cat "${CI_ARTIFACTS_DIRECTORY}/BUG_REPORT.md" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload CI audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-ci-audit-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            ci-artifacts/
            coverage/lcov.info
          if-no-files-found: warn
          retention-days: 30

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-coverage-${{ github.run_number }}-${{ github.run_attempt }}
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 30

      - name: Enforce quality gate
        if: always()
        env:
          SECRET_EXIT: ${{ steps.secret_scan.outputs.exit_code }}
          FORMAT_EXIT: ${{ steps.format.outputs.exit_code }}
          ANALYZE_EXIT: ${{ steps.analyze.outputs.exit_code }}
          TEST_EXIT: ${{ steps.tests.outputs.exit_code }}
        run: |
          secret_exit="${SECRET_EXIT:-1}"
          format_exit="${FORMAT_EXIT:-1}"
          analyze_exit="${ANALYZE_EXIT:-1}"
          test_exit="${TEST_EXIT:-1}"

          failed=0

          if [[ "${secret_exit}" != "0" ]]; then
            echo "::error::Secret hygiene scan failed with exit code ${secret_exit}."
            failed=1
          fi

          if [[ "${format_exit}" != "0" ]]; then
            echo "::error::Dart formatting failed with exit code ${format_exit}."
            failed=1
          fi

          if [[ "${analyze_exit}" != "0" ]]; then
            echo "::error::Flutter analyze failed with exit code ${analyze_exit}."
            failed=1
          fi

          if [[ "${test_exit}" != "0" ]]; then
            echo "::error::Flutter tests failed with exit code ${test_exit}."
            failed=1
          fi

          if [[ "${failed}" -ne 0 ]]; then
            echo "Hydrion quality gate failed. Download the CI audit artifact and review BUG_REPORT.md."
            exit 1
          fi

          echo "Hydrion quality gate passed."

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: quality-gate

    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Prepare Android signing config
        id: android-signing
        env:
          HYDRION_ANDROID_KEYSTORE_BASE64: ${{ secrets.HYDRION_ANDROID_KEYSTORE_BASE64 }}
          HYDRION_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.HYDRION_ANDROID_KEYSTORE_PASSWORD }}
          HYDRION_ANDROID_KEY_ALIAS: ${{ secrets.HYDRION_ANDROID_KEY_ALIAS }}
          HYDRION_ANDROID_KEY_PASSWORD: ${{ secrets.HYDRION_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          signing_values=0
          for value in \
            "${HYDRION_ANDROID_KEYSTORE_BASE64}" \
            "${HYDRION_ANDROID_KEYSTORE_PASSWORD}" \
            "${HYDRION_ANDROID_KEY_ALIAS}" \
            "${HYDRION_ANDROID_KEY_PASSWORD}"; do
            if [[ -n "${value}" ]]; then
              signing_values=$((signing_values + 1))
            fi
          done

          if [[ "${signing_values}" -eq 0 ]]; then
            echo "::notice::Android release signing secrets are not configured. CI will create an ephemeral CI-signed release APK for clean device installs. Configure HYDRION_ANDROID_* secrets for stable production signing and store upload."

            ci_store_password="$(openssl rand -base64 24)"
            ci_key_password="$(openssl rand -base64 24)"
            ci_key_alias="hydrion-ci-release"

            echo "::add-mask::${ci_store_password}"
            echo "::add-mask::${ci_key_password}"
            echo "::add-mask::${ci_key_alias}"

            keytool -genkeypair \
              -v \
              -keystore android/hydrion-ci-release.jks \
              -storepass "${ci_store_password}" \
              -keypass "${ci_key_password}" \
              -alias "${ci_key_alias}" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 30 \
              -dname "CN=Hydrion CI,O=The 1807,C=US"

            cat > android/key.properties <<EOF
          storeFile=../hydrion-ci-release.jks
          storePassword=${ci_store_password}
          keyAlias=${ci_key_alias}
          keyPassword=${ci_key_password}
          EOF

            echo "release_signing_available=true" >> "${GITHUB_OUTPUT}"
            echo "release_signing_kind=ci-ephemeral" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${signing_values}" -ne 4 ]]; then
            echo "Android release signing secrets are partially configured. Set all four HYDRION_ANDROID_* secrets or remove them all."
            exit 1
          fi

          echo "::add-mask::${HYDRION_ANDROID_KEYSTORE_PASSWORD}"
          echo "::add-mask::${HYDRION_ANDROID_KEY_ALIAS}"
          echo "::add-mask::${HYDRION_ANDROID_KEY_PASSWORD}"

          printf '%s' "${HYDRION_ANDROID_KEYSTORE_BASE64}" |
            base64 --decode > android/hydrion-release.jks

          cat > android/key.properties <<EOF
          storeFile=../hydrion-release.jks
          storePassword=${HYDRION_ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${HYDRION_ANDROID_KEY_ALIAS}
          keyPassword=${HYDRION_ANDROID_KEY_PASSWORD}
          EOF

          echo "release_signing_available=true" >> "${GITHUB_OUTPUT}"
          echo "release_signing_kind=production" >> "${GITHUB_OUTPUT}"

      - name: Build debug APK for device smoke installs
        run: flutter build apk --debug

      - name: Upload debug Android APK
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-android-debug-apk-${{ github.run_number }}-${{ github.run_attempt }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Build signed release APK
        if: steps.android-signing.outputs.release_signing_available == 'true'
        run: flutter build apk --release

      - name: Verify signed release APK
        if: steps.android-signing.outputs.release_signing_available == 'true'
        run: |
          set -euo pipefail

          apk_path="build/app/outputs/flutter-apk/app-release.apk"
          test -f "${apk_path}" || {
            echo "Signed release APK was not produced at ${apk_path}."
            exit 1
          }

          apksigner="$(find "${ANDROID_HOME}/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          if [[ -z "${apksigner}" ]]; then
            echo "apksigner was not found in ${ANDROID_HOME}/build-tools."
            exit 1
          fi

          "${apksigner}" verify --verbose --print-certs "${apk_path}"

      - name: Generate Android size audit
        if: steps.android-signing.outputs.release_signing_available == 'true'
        run: |
          mkdir -p "${CI_ARTIFACTS_DIRECTORY}"
          dart run tool/android_size_audit.dart \
            --output "${CI_ARTIFACTS_DIRECTORY}/hydrion-android-size-audit.txt" \
            build/app/outputs/flutter-apk

      - name: Upload signed release Android APK
        if: steps.android-signing.outputs.release_signing_available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-android-${{ steps.android-signing.outputs.release_signing_kind }}-signed-release-apk-${{ github.run_number }}-${{ github.run_attempt }}
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Android size audit
        if: steps.android-signing.outputs.release_signing_available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-android-size-audit-${{ github.run_number }}-${{ github.run_attempt }}
          path: ${{ env.CI_ARTIFACTS_DIRECTORY }}/hydrion-android-size-audit.txt
          if-no-files-found: error
          retention-days: 14

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality-gate

    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Flutter web
        run: flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: hydrion-web-build-${{ github.run_number }}-${{ github.run_attempt }}
          path: build/web
          if-no-files-found: error
          retention-days: 14
